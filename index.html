<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Leon Terrell Ash - Music</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: #fff;
      text-align: center;
    }

    header {
      padding: 50px 20px;
      background: linear-gradient(135deg, #111, #1db954);
    }

    h1 {
      margin: 0;
      font-size: 2.8rem;
    }

    .container {
      padding: 30px 20px;
      max-width: 600px;
      margin: auto;
    }

    .song {
      margin-bottom: 40px;
      padding: 25px;
      background: #1a1a1a;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
    }

    audio {
      width: 100%;
      margin: 15px 0;
    }

    .btn {
      display: inline-block;
      padding: 12px 25px;
      background: #1db954;
      color: #fff;
      text-decoration: none;
      border-radius: 6px;
      margin-top: 10px;
      font-weight: bold;
    }

    .btn:hover {
      background: #17a44b;
    }

    footer {
      margin-top: 50px;
      padding: 20px;
      font-size: 0.9rem;
      color: #aaa;
    }
  </style>
</head>

<body>

<header>
  <h1>Leon Terrell Ash</h1>
  <p>Listen. Support. Download.</p>
</header>

<div class="container">

  <div class="song">
    <h2>In My Zone</h2>
    <p>Produced by Leon Terrell Ash</p>
    
    <audio controls>
      <source src="smaple.mp3" type="audio/mpeg">
    </audio>

    <a class="btn" href="https://teamash26.gumroad.com/l/InMyZone" target="_blank">
      Buy / Download
    </a>
  </div>

</div>

<footer>
  © 2026 Leon Terrell Ash | All Rights Reserved
</footer>

</body>
</html>
